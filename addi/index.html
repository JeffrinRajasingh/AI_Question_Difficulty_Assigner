<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Question Assignment System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            color: #4a5568;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .header p {
            color: #718096;
            font-size: 1.1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .input-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .input-section h2 {
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #48bb78, #38a169);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f56565, #e53e3e);
        }

        .student-list, .question-list {
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
        }

        .student-item, .question-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            background: #f7fafc;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .difficulty-badge {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .difficulty-easy { background: #c6f6d5; color: #22543d; }
        .difficulty-medium { background: #fed7aa; color: #9c4221; }
        .difficulty-hard { background: #fbb6ce; color: #97266d; }

        .results-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            grid-column: 1 / -1;
        }

        .results-section h2 {
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #48bb78;
            padding-bottom: 10px;
        }

        .assignment-card {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 20px;
            margin: 15px 0;
            transition: all 0.3s ease;
        }

        .assignment-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .student-header {
            display: flex;
            justify-content: between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e2e8f0;
        }

        .student-name {
            font-size: 1.3em;
            font-weight: 600;
            color: #4a5568;
        }

        .student-marks {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .assigned-questions {
            margin-top: 15px;
        }

        .question-card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            border-left: 4px solid #48bb78;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Smart Question Assignment System</h1>
            <p>AI-powered personalized question assignment based on student performance</p>
        </div>

        <div class="main-content">
            <!-- Student Input Section -->
            <div class="input-section">
                <h2>📚 Students & Marks</h2>
                <div class="form-group">
                    <label for="studentName">Student Name:</label>
                    <input type="text" id="studentName" placeholder="Enter student name">
                </div>
                <div class="form-group">
                    <label for="studentMarks">Marks (0-100):</label>
                    <input type="number" id="studentMarks" min="0" max="100" placeholder="Enter marks">
                </div>
                <button class="btn" onclick="addStudent()">Add Student</button>
                <button class="btn btn-danger" onclick="clearStudents()">Clear All</button>

                <div class="student-list" id="studentList">
                    <p style="text-align: center; color: #718096;">No students added yet</p>
                </div>
            </div>

            <!-- Question Input Section -->
            <div class="input-section">
                <h2>❓ Question Bank</h2>
                <div class="form-group">
                    <label for="questionText">Question:</label>
                    <textarea id="questionText" placeholder="Enter your question here..."></textarea>
                </div>
                <button class="btn" onclick="addQuestion()">Add Question</button>
                <button class="btn btn-danger" onclick="clearQuestions()">Clear All</button>

                <div class="question-list" id="questionList">
                    <p style="text-align: center; color: #718096;">No questions added yet</p>
                </div>
            </div>
        </div>

        <!-- Assignment Button -->
        <div style="text-align: center; margin: 30px 0;">
            <button class="btn btn-secondary" onclick="assignQuestions()" style="font-size: 18px; padding: 15px 40px;">
                🤖 Assign Questions with AI
            </button>
        </div>

        <!-- Loading Animation -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI is analyzing and assigning questions...</p>
        </div>

        <!-- Results Section -->
        <div class="results-section" id="resultsSection" style="display: none;">
            <h2>📋 Assignment Results</h2>
            <div id="assignmentResults"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" onclick="exportResults()">📥 Export Results</button>
            </div>
        </div>
    </div>

    <script>
        let students = [];
        let questions = [];
        let assignments = [];

        // Difficulty prediction based on marks (rule-based model)
        function predictStudentDifficulty(marks) {
            if (marks >= 80) return 'Hard';
            if (marks >= 60) return 'Medium';
            return 'Easy';
        }

        // Question difficulty prediction (simplified NLP-based approach)
        function predictQuestionDifficulty(questionText) {
            const text = questionText.toLowerCase();
            
            // Hard indicators
            const hardKeywords = ['analyze', 'evaluate', 'compare', 'synthesize', 'derive', 'prove', 'complex', 'advanced', 'calculate complex', 'differential', 'integral'];
            const hardScore = hardKeywords.reduce((score, keyword) => score + (text.includes(keyword) ? 1 : 0), 0);
            
            // Medium indicators
            const mediumKeywords = ['explain', 'describe', 'apply', 'solve', 'calculate', 'determine', 'find', 'compute'];
            const mediumScore = mediumKeywords.reduce((score, keyword) => score + (text.includes(keyword) ? 1 : 0), 0);
            
            // Easy indicators
            const easyKeywords = ['what', 'who', 'when', 'where', 'list', 'name', 'identify', 'define', 'recall'];
            const easyScore = easyKeywords.reduce((score, keyword) => score + (text.includes(keyword) ? 1 : 0), 0);
            
            // Length-based complexity
            const wordCount = text.split(' ').length;
            let lengthScore = 0;
            if (wordCount > 50) lengthScore += 2; // Hard
            else if (wordCount > 20) lengthScore += 1; // Medium
            
            // Mathematical complexity
            const mathSymbols = /[∫∑∏√±≤≥≠∞∂]/g;
            const mathScore = (text.match(mathSymbols) || []).length;
            
            // Final scoring
            const totalHardScore = hardScore * 2 + lengthScore + mathScore;
            const totalMediumScore = mediumScore;
            const totalEasyScore = easyScore;
            
            if (totalHardScore > totalMediumScore && totalHardScore > totalEasyScore) return 'Hard';
            if (totalMediumScore > totalEasyScore) return 'Medium';
            return 'Easy';
        }

        function addStudent() {
            const name = document.getElementById('studentName').value.trim();
            const marks = parseInt(document.getElementById('studentMarks').value);
            
            if (!name || isNaN(marks) || marks < 0 || marks > 100) {
                alert('Please enter a valid name and marks (0-100)');
                return;
            }
            
            const difficulty = predictStudentDifficulty(marks);
            students.push({ name, marks, difficulty });
            
            document.getElementById('studentName').value = '';
            document.getElementById('studentMarks').value = '';
            
            updateStudentList();
        }

        function addQuestion() {
            const text = document.getElementById('questionText').value.trim();
            
            if (!text) {
                alert('Please enter a question');
                return;
            }
            
            const difficulty = predictQuestionDifficulty(text);
            questions.push({ text, difficulty });
            
            document.getElementById('questionText').value = '';
            
            updateQuestionList();
        }

        function updateStudentList() {
            const listElement = document.getElementById('studentList');
            
            if (students.length === 0) {
                listElement.innerHTML = '<p style="text-align: center; color: #718096;">No students added yet</p>';
                return;
            }
            
            listElement.innerHTML = students.map((student, index) => `
                <div class="student-item">
                    <div>
                        <strong>${student.name}</strong> - ${student.marks} marks
                        <span class="difficulty-badge difficulty-${student.difficulty.toLowerCase()}">${student.difficulty}</span>
                    </div>
                    <button class="btn btn-danger" onclick="removeStudent(${index})" style="padding: 5px 10px; font-size: 12px;">Remove</button>
                </div>
            `).join('');
        }

        function updateQuestionList() {
            const listElement = document.getElementById('questionList');
            
            if (questions.length === 0) {
                listElement.innerHTML = '<p style="text-align: center; color: #718096;">No questions added yet</p>';
                return;
            }
            
            listElement.innerHTML = questions.map((question, index) => `
                <div class="question-item">
                    <div>
                        <div style="margin-bottom: 5px;">${question.text.substring(0, 100)}${question.text.length > 100 ? '...' : ''}</div>
                        <span class="difficulty-badge difficulty-${question.difficulty.toLowerCase()}">${question.difficulty}</span>
                    </div>
                    <button class="btn btn-danger" onclick="removeQuestion(${index})" style="padding: 5px 10px; font-size: 12px;">Remove</button>
                </div>
            `).join('');
        }

        function removeStudent(index) {
            students.splice(index, 1);
            updateStudentList();
        }

        function removeQuestion(index) {
            questions.splice(index, 1);
            updateQuestionList();
        }

        function clearStudents() {
            students = [];
            updateStudentList();
        }

        function clearQuestions() {
            questions = [];
            updateQuestionList();
        }

        function assignQuestions() {
            if (students.length === 0 || questions.length === 0) {
                alert('Please add both students and questions before assignment');
                return;
            }
            
            // Show loading
            document.getElementById('loading').classList.add('show');
            document.getElementById('resultsSection').style.display = 'none';
            
            // Simulate AI processing time
            setTimeout(() => {
                assignments = [];
                
                students.forEach(student => {
                    // Find questions matching student's difficulty level
                    let availableQuestions = questions.filter(q => q.difficulty === student.difficulty);
                    
                    // If no exact match, use adaptive assignment
                    if (availableQuestions.length === 0) {
                        if (student.difficulty === 'Easy') {
                            availableQuestions = questions.filter(q => q.difficulty === 'Medium');
                        } else if (student.difficulty === 'Hard') {
                            availableQuestions = questions.filter(q => q.difficulty === 'Medium');
                        } else {
                            availableQuestions = questions; // Use all questions for medium students
                        }
                    }
                    
                    // Assign 2-3 questions randomly
                    const numQuestions = Math.min(3, availableQuestions.length);
                    const assignedQuestions = [];
                    
                    for (let i = 0; i < numQuestions; i++) {
                        const randomIndex = Math.floor(Math.random() * availableQuestions.length);
                        assignedQuestions.push(availableQuestions[randomIndex]);
                        availableQuestions.splice(randomIndex, 1);
                    }
                    
                    assignments.push({
                        student: student,
                        questions: assignedQuestions
                    });
                });
                
                // Hide loading and show results
                document.getElementById('loading').classList.remove('show');
                showResults();
            }, 2000);
        }

        function showResults() {
            document.getElementById('resultsSection').style.display = 'block';
            const resultsElement = document.getElementById('assignmentResults');
            
            resultsElement.innerHTML = assignments.map(assignment => `
                <div class="assignment-card">
                    <div class="student-header">
                        <div class="student-name">${assignment.student.name}</div>
                        <div>
                            <span class="student-marks">${assignment.student.marks} marks</span>
                            <span class="difficulty-badge difficulty-${assignment.student.difficulty.toLowerCase()}">${assignment.student.difficulty} Level</span>
                        </div>
                    </div>
                    <div class="assigned-questions">
                        <strong>Assigned Questions (${assignment.questions.length}):</strong>
                        ${assignment.questions.map((q, index) => `
                            <div class="question-card">
                                <div style="margin-bottom: 5px;"><strong>Q${index + 1}:</strong> ${q.text}</div>
                                <span class="difficulty-badge difficulty-${q.difficulty.toLowerCase()}">${q.difficulty}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
            
            // Scroll to results
            document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth' });
        }

        function exportResults() {
            if (assignments.length === 0) {
                alert('No assignments to export');
                return;
            }
            
            let csvContent = 'Student Name,Marks,Difficulty Level,Question,Question Difficulty\n';
            
            assignments.forEach(assignment => {
                assignment.questions.forEach((question, qIndex) => {
                    csvContent += `"${assignment.student.name}",${assignment.student.marks},"${assignment.student.difficulty}","${question.text}","${question.difficulty}"\n`;
                });
            });
            
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'question_assignments.csv';
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // Sample data for demonstration
        function loadSampleData() {
            // Sample students
            const sampleStudents = [
                { name: 'Alice Johnson', marks: 95 },
                { name: 'Bob Smith', marks: 75 },
                { name: 'Charlie Brown', marks: 45 },
                { name: 'Diana Ross', marks: 88 }
            ];
            
            const sampleQuestions = [
                'What is the capital of France?',
                'Explain the concept of photosynthesis in plants.',
                'Analyze the causes and effects of World War II.',
                'Calculate the derivative of x³ + 2x² - 5x + 3.',
                'Who wrote Romeo and Juliet?',
                'Describe the process of cellular respiration.',
                'Evaluate the impact of social media on modern communication.',
                'Solve for x: 2x + 5 = 13'
            ];
            
            // Add sample students
            sampleStudents.forEach(student => {
                const difficulty = predictStudentDifficulty(student.marks);
                students.push({ ...student, difficulty });
            });
            
            // Add sample questions
            sampleQuestions.forEach(questionText => {
                const difficulty = predictQuestionDifficulty(questionText);
                questions.push({ text: questionText, difficulty });
            });
            
            updateStudentList();
            updateQuestionList();
        }

        // Load sample data on page load
        window.onload = function() {
            // Uncomment the line below to load sample data automatically
            // loadSampleData();
        };
    </script>
</body>
</html>
